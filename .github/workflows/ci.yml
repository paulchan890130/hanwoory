name: CI

# 저장소 검증 — 운영 비밀키/배포/운영 migration 없음.
# 백엔드(compileall + pytest + alembic 단일 head + migration upgrade) / 프론트(tsc + lint + build).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kid
          POSTGRES_PASSWORD: kid
          POSTGRES_DB: kid_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # CI 전용 더미 시크릿(운영 값 아님).
      JWT_SECRET_KEY: "ci-only-not-a-secret"
      HANWOORY_ENV: "local"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps (test subset)
        run: |
          python -m pip install --upgrade pip
          # 테스트 수집/실행이 transitively 필요로 하는 것만(무거운 OCR paddle* 은 lazy → 제외).
          # httpx: starlette TestClient(fastapi) 필수. Pillow: ocr/roi_ocr 서비스 top-import.
          # openpyxl: 고객 Excel export/import 테스트 및 서비스 의존성(requirements.txt 에도 존재).
          # pymupdf(fitz): 문서 필드계약(PDF 위젯) 검사·실제 템플릿 테스트에 필요(requirements.txt 에도 존재).
          pip install fastapi "uvicorn[standard]" python-multipart "python-jose[cryptography]" \
                      "SQLAlchemy>=2.0,<2.1" "psycopg[binary]>=3.1" "alembic>=1.13" \
                      "pydantic-settings>=2.0" pytest requests Pillow openpyxl pymupdf httpx
      - name: Compile check
        run: python -m compileall backend -q
      - name: Alembic single head
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          heads = ScriptDirectory.from_config(Config("alembic.ini")).get_heads()
          print("heads:", heads)
          assert len(heads) == 1, f"multiple alembic heads: {heads}"
          PY
      - name: Alembic upgrade head (empty DB, real PostgreSQL)
        env:
          DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_ci"
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.upgrade(Config('alembic.ini'),'head')"
      - name: Reset DB then PostgreSQL migration dry-run (0030->0031 fixture + partial-unique + idempotency)
        env:
          DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_ci"
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.downgrade(Config('alembic.ini'),'base')"
          python scripts/mig_dryrun_check.py
      # pytest 는 DATABASE_URL 을 설정하지 않는다 — 테스트가 자체 SQLite 로 get_sessionmaker 를
      # monkeypatch 하므로 불필요하고, 앱 lifespan 이 실 DB 로 붙는 것을 피한다(로컬 통과 조건과 동일).
      - name: Pytest
        run: python -m pytest backend/tests -q
      # 실제 PostgreSQL 통합·동시성 — SQLite 로 못 잡는 FOR UPDATE 좌석 경쟁/상태 전이 +
      # 사업장 전체 폐기/연결변경/스키마 커버리지 검증. 전용 DB(kid_saas_it / kid_saas_it_purge)를
      # 테스트 fixture 가 CREATE DATABASE 로 만들어 격리 실행한다(kid 는 superuser → CREATEDB 가능).
      - name: PostgreSQL integration + concurrency + tenant purge (real FOR UPDATE)
        env:
          TEST_DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_saas_it"
        run: python -m pytest backend/tests/test_saas_pg_integration.py backend/tests/test_tenant_purge_pg.py -q
      # 체류자격 canonical(V=v_status 저장 / visa_status legacy fallback / 추출 round-trip).
      # 전용 DB(kid_it_customer)로 격리 실행(fixture 가 CREATE DATABASE).
      - name: PostgreSQL customer visa contract integration
        env:
          TEST_DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_it_customer"
        run: python -m pytest backend/tests/test_customer_visa_pg.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # 빌드 중 sitemap fetch 실패(백엔드 미기동)는 기존과 동일하게 graceful — 빌드 실패 아님.
          API_URL: "http://127.0.0.1:8000"

  # 공통기준 자가점검 E2E — 백엔드/DB 없이 next start + 기본설정 fallback 으로 동작.
  # 운영 이미지에는 브라우저 미포함(여기서만 chromium 설치). 실제 문자 발송/운영 키/운영 DB 미사용.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      - name: Build (needed by `next start` webServer)
        run: npm run build
        env:
          API_URL: "http://127.0.0.1:59999"
      - name: Playwright test (360×740 / 375×812 / 390×844 / 412×915 무스크롤 포함)
        run: npx playwright test
      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/e2e/.report
            frontend/e2e/.artifacts
            frontend/test-results
          retention-days: 7
          if-no-files-found: ignore
