[pytest]
# 기본 테스트 경로를 실제 단위테스트 디렉터리로 한정한다.
# backend/scripts/test_*.py 는 수동 POC/통합 스크립트(win32com·cv2·DB 접속 등 부수효과)라
# pytest 가 수집하면 표준 스트림 fd 를 닫아 capture-teardown 단계에서
# ValueError("I/O operation on closed file") artifact 가 발생한다.
# testpaths 로 수집 대상을 backend/tests 로 고정해 기본 캡처 모드(-s 없이)에서도 정상 종료한다.
testpaths = backend/tests
# 저장소 루트를 sys.path 에 넣어 `backend` 패키지 import 를 보장한다. bare `pytest`(콘솔
# 스크립트)는 CWD 를 sys.path 에 넣지 않아 CI(Linux)에서 ModuleNotFoundError: backend 가 났다.
# `python -m pytest`(CWD 자동 추가)와 무관하게 항상 동작하도록 고정한다.
pythonpath = .
