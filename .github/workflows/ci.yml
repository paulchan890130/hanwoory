name: CI

# 저장소 검증 — 운영 비밀키/배포/운영 migration 없음.
# 백엔드(compileall + pytest + alembic 단일 head + migration upgrade) / 프론트(tsc + lint + build).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kid
          POSTGRES_PASSWORD: kid
          POSTGRES_DB: kid_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # CI 전용 더미 시크릿(운영 값 아님). PII 키는 테스트에서 실제 사용되지 않음.
      DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_ci"
      JWT_SECRET_KEY: "ci-only-not-a-secret"
      HANWOORY_ENV: "local"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps (test subset)
        run: |
          python -m pip install --upgrade pip
          # 테스트/검증에 필요한 최소 셋 — 무거운 OCR(paddle 등)은 CI 에서 제외.
          pip install fastapi "uvicorn[standard]" python-multipart "python-jose[cryptography]" \
                      "SQLAlchemy>=2.0,<2.1" "psycopg[binary]>=3.1" "alembic>=1.13" \
                      "pydantic-settings>=2.0" pytest requests
      - name: Compile check
        run: python -m compileall backend -q
      - name: Alembic single head
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          heads = ScriptDirectory.from_config(Config("alembic.ini")).get_heads()
          print("heads:", heads)
          assert len(heads) == 1, f"multiple alembic heads: {heads}"
          PY
      - name: Alembic upgrade head (empty DB)
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.upgrade(Config('alembic.ini'),'head')"
      - name: Alembic single head after upgrade (current == head)
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.current(Config('alembic.ini'))"
      - name: Pytest
        run: pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # 빌드 중 sitemap fetch 실패(백엔드 미기동)는 기존과 동일하게 graceful — 빌드 실패 아님.
          API_URL: "http://127.0.0.1:8000"
