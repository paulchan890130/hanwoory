version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kid-backend
    ports:
      - "8000:8000"
    environment:
      HANWOORY_ENV: server
      ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET_KEY: change-this-secret
      GOOGLE_APPLICATION_CREDENTIALS: /etc/secrets/hanwoory-9eaa1a4c54d7.json
    volumes:
      - .:/app
      - "C:/Users/66885/Documents/K.ID 출입국업무관리 실험/hanwoory-9eaa1a4c54d7.json:/etc/secrets/hanwoory-9eaa1a4c54d7.json:ro"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        API_URL: http://backend:8000
    container_name: kid-frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped