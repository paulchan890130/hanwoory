name: CI

# 저장소 검증 — 운영 비밀키/배포/운영 migration 없음.
# 백엔드(compileall + pytest + alembic 단일 head + migration upgrade) / 프론트(tsc + lint + build).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kid
          POSTGRES_PASSWORD: kid
          POSTGRES_DB: kid_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # CI 전용 더미 시크릿(운영 값 아님).
      JWT_SECRET_KEY: "ci-only-not-a-secret"
      HANWOORY_ENV: "local"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps (test subset)
        run: |
          python -m pip install --upgrade pip
          # 테스트 수집/실행이 transitively 필요로 하는 것만(무거운 OCR paddle* 은 lazy → 제외).
          # httpx: starlette TestClient(fastapi) 필수. Pillow: ocr/roi_ocr 서비스 top-import.
          pip install fastapi "uvicorn[standard]" python-multipart "python-jose[cryptography]" \
                      "SQLAlchemy>=2.0,<2.1" "psycopg[binary]>=3.1" "alembic>=1.13" \
                      "pydantic-settings>=2.0" pytest requests Pillow httpx
      - name: Compile check
        run: python -m compileall backend -q
      - name: Alembic single head
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          heads = ScriptDirectory.from_config(Config("alembic.ini")).get_heads()
          print("heads:", heads)
          assert len(heads) == 1, f"multiple alembic heads: {heads}"
          PY
      - name: Alembic upgrade head (empty DB, real PostgreSQL)
        env:
          DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_ci"
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.upgrade(Config('alembic.ini'),'head')"
      - name: Reset DB then PostgreSQL migration dry-run (0030->0031 fixture + partial-unique + idempotency)
        env:
          DATABASE_URL: "postgresql+psycopg://kid:kid@localhost:5432/kid_ci"
        run: |
          python -c "from alembic.config import Config; from alembic import command; command.downgrade(Config('alembic.ini'),'base')"
          python scripts/mig_dryrun_check.py
      # pytest 는 DATABASE_URL 을 설정하지 않는다 — 테스트가 자체 SQLite 로 get_sessionmaker 를
      # monkeypatch 하므로 불필요하고, 앱 lifespan 이 실 DB 로 붙는 것을 피한다(로컬 통과 조건과 동일).
      - name: Pytest
        run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # 빌드 중 sitemap fetch 실패(백엔드 미기동)는 기존과 동일하게 graceful — 빌드 실패 아님.
          API_URL: "http://127.0.0.1:8000"
